<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="author" content="Sauryaman Bisen">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="./Style/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <title>Calculator</title>
</head>
<body>
  <div class="Calculator">
    <input type="text" placeholder="0" id="inputBox">
    <div class="row">
      <button class="operator" data-val="AC">AC</button>
      <button class="operator" data-val="DE"><i class="fa-solid fa-delete-left"></i></button>
      <button class="operator" data-val="%"><i class="fa-solid fa-percent"></i></button>
      <button class="operator" data-val="/"><i class="fa-solid fa-divide"></i></button>
    </div>
    <div class="row">
      <button data-val="7">7</button>
      <button data-val="8">8</button>
      <button data-val="9">9</button>
      <button class="operator" data-val="*"><i class="fa-solid fa-xmark"></i></button>
    </div>
    <div class="row">
      <button data-val="4">4</button>
      <button data-val="5">5</button>
      <button data-val="6">6</button>
      <button class="operator" data-val="-"><i class="fa-solid fa-minus"></i></button>
    </div>
    <div class="row">
      <button data-val="1">1</button>
      <button data-val="2">2</button>
      <button data-val="3">3</button>
      <button class="operator" data-val="+"><i class="fa-solid fa-plus"></i></button>
    </div>
    <div class="row">
      <button data-val="00">00</button>
      <button data-val="0">0</button>
      <button data-val=".">.</button>
      <button class="equalBtn" data-val="="><i class="fa-solid fa-equals"></i></button>
    </div>
  </div>
  <script src="./Script/script.js"></script>
</body>
</html>
